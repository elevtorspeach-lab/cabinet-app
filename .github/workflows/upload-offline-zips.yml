name: Upload Offline ZIPs

on:
  workflow_dispatch:
  push:
    branches:
      - "github-audience-status-selection"

jobs:
  upload-offline-zips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build offline ZIP files
        run: |
          zip -qr offline-mac-2026-03-11.zip release/mac/applicationversion1-Offline-Mac
          zip -qr offline-windows-2026-03-11.zip release/windows/applicationversion1-Offline
          zip -qr offline-windows-ready-2026-03-11.zip release/windows/applicationversion1-Windows-READY

      - name: Upload offline ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cabinet-offline-zips
          path: |
            offline-mac-2026-03-11.zip
            offline-windows-2026-03-11.zip
            offline-windows-ready-2026-03-11.zip

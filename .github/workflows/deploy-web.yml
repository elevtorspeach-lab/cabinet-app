name: Deploy Web App

on:
  push:
    branches:
      - main
      - cabinetlasttttupdat
      - cabinet-araqi-offline-update
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp index.html dist/
          cp app.js dist/
          cp style.css dist/
          cp state-persistence.js dist/
          cp render-dashboard.js dist/
          cp render-audience-suivi.js dist/
          cp render-diligence.js dist/
          cp audience-ui-helpers.js dist/
          cp -R assets dist/assets
          cp -R vendor dist/vendor
          cp -R workers dist/workers

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
